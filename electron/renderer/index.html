<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maxawon</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">C</span>
          <div>
            <strong>Maxawon</strong>
            <small>Data Reader</small>
          </div>
        </div>

        <nav class="nav">
          <div class="nav-group">
            <button class="nav-button nav-parent active" data-view="session">Cretop</button>
            <button class="nav-button nav-child" data-view="capture">Cretop 검색결과 저장하기</button>
          </div>
          <div class="nav-group">
            <button class="nav-button nav-parent" data-view="ppt-forger">PPT Forger</button>
          </div>
          <button class="nav-button" data-view="updates">앱 최신버전 설치하기</button>
        </nav>

        <div id="appVersion" class="app-version"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Desktop Console</p>
            <h1>Maxawon</h1>
          </div>
          <div class="top-status">
            <span id="loginPill" class="connection-pill disconnected">
              <span class="status-dot"></span>
              <span id="loginText">미연결</span>
            </span>
          </div>
        </header>

        <section id="session" class="view active">
          <div class="panel page-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Chrome Session</p>
                <h2>Cretop</h2>
              </div>
              <div class="panel-actions">
                <button id="openChrome" class="primary">Chrome 열기</button>
                <button id="loginDone" class="primary">로그인 완료</button>
                <button id="closeAppChrome" class="danger">실행된 Chrome 종료</button>
                <button id="closeAllChrome" class="danger">전체 Chrome 종료</button>
              </div>
            </div>

            <div class="page-body">
              <div data-info="session"></div>
            </div>
          </div>
        </section>

        <section id="capture" class="view">
          <div class="panel page-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Condition Search Export</p>
                <h2>Cretop 검색결과 저장하기</h2>
              </div>
              <div class="panel-actions">
                <button id="captureTable" class="primary">현재 조건검색 테이블 저장</button>
              </div>
            </div>

            <div class="page-body">
              <section class="page-section control-section">
                <h3>실행 설정</h3>
                <div class="form-grid">
                  <label>
                    <span>최대 페이지</span>
                    <input id="maxPages" type="number" min="1" placeholder="비우면 끝까지" />
                  </label>
                  <label class="file-field">
                    <span>저장 파일</span>
                    <div>
                      <input id="captureOutput" type="text" readonly />
                      <button id="pickOutput" class="secondary">변경</button>
                    </div>
                  </label>
                </div>
              </section>

              <div data-info="capture"></div>
            </div>
          </div>
        </section>

        <section id="ppt-forger" class="view">
          <div class="panel page-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">PPT Template Export</p>
                <h2>PPT Forger</h2>
              </div>
              <div class="panel-actions">
                <button id="buildPptData" class="secondary">데이터 만들기</button>
                <button id="generatePpt" class="primary">PPT 생성</button>
              </div>
            </div>

            <div class="page-body">
              <section class="page-section control-section">
                <h3>원본 데이터</h3>
                <div class="form-grid ppt-form-grid">
                  <label>
                    <span>종목코드</span>
                    <input id="pptStockCode" type="text" inputmode="numeric" maxlength="6" placeholder="예: 005930" />
                  </label>
                  <label>
                    <span>메자닌 종류</span>
                    <input id="pptMezzType" type="text" placeholder="예: 전환사채(CB)" />
                  </label>
                  <label>
                    <span>투자금액</span>
                    <input id="pptInvestmentAmt" type="text" placeholder="예: 100" />
                  </label>
                  <label>
                    <span>발행금액</span>
                    <input id="pptIssueAmt" type="text" placeholder="예: 200" />
                  </label>
                  <label>
                    <span>Call 비율(%)</span>
                    <input id="pptCallPercent" type="number" min="0" max="100" placeholder="예: 30" />
                  </label>
                  <label>
                    <span>리픽싱 비율(%)</span>
                    <input id="pptRefixingPercent" type="number" min="0" max="100" placeholder="예: 70" />
                  </label>
                  <label>
                    <span>기발행 메자닌 주식수</span>
                    <input id="pptPriorMezzanineShares" type="text" placeholder="없으면 비워둠" />
                  </label>
                  <label>
                    <span>표시 주주 수</span>
                    <input id="pptMaxShareholders" type="number" min="1" value="10" />
                  </label>
                  <label class="checkbox-field">
                    <span>자사주 EB</span>
                    <input id="pptTreasuryEb" type="checkbox" />
                  </label>
                  <label class="file-field">
                    <span>Model.xlsx</span>
                    <div>
                      <input id="pptExcel" type="text" readonly />
                      <button id="pickPptExcel" class="secondary">선택</button>
                    </div>
                  </label>
                  <label class="file-field">
                    <span>PPT 템플릿</span>
                    <div>
                      <input id="pptTemplate" type="text" readonly />
                      <button id="pickPptTemplate" class="secondary">선택</button>
                    </div>
                  </label>
                  <label class="file-field">
                    <span>저장 파일</span>
                    <div>
                      <input id="pptOutput" type="text" readonly />
                      <button id="pickPptOutput" class="secondary">변경</button>
                    </div>
                  </label>
                </div>
              </section>

              <section class="page-section control-section">
                <h3>AI 문구</h3>
                <div class="form-grid ppt-form-grid">
                  <label>
                    <span>투자포인트 1 제목</span>
                    <input id="investmentTextTitle1" type="text" />
                  </label>
                  <label>
                    <span>투자포인트 1 내용 A</span>
                    <input id="investmentTextContents11" type="text" />
                  </label>
                  <label>
                    <span>투자포인트 1 내용 B</span>
                    <input id="investmentTextContents12" type="text" />
                  </label>
                  <label>
                    <span>투자포인트 2 제목</span>
                    <input id="investmentTextTitle2" type="text" />
                  </label>
                  <label>
                    <span>투자포인트 2 내용 A</span>
                    <input id="investmentTextContents21" type="text" />
                  </label>
                  <label>
                    <span>투자포인트 2 내용 B</span>
                    <input id="investmentTextContents22" type="text" />
                  </label>
                  <label>
                    <span>투자포인트 3 제목</span>
                    <input id="investmentTextTitle3" type="text" />
                  </label>
                  <label>
                    <span>투자포인트 3 내용 A</span>
                    <input id="investmentTextContents31" type="text" />
                  </label>
                  <label>
                    <span>투자포인트 3 내용 B</span>
                    <input id="investmentTextContents32" type="text" />
                  </label>
                  <label>
                    <span>주가 포인트 1</span>
                    <input id="priceTextTitle1" type="text" />
                  </label>
                  <label>
                    <span>주가 포인트 2</span>
                    <input id="priceTextTitle2" type="text" />
                  </label>
                  <label>
                    <span>리스크 1 제목</span>
                    <input id="riskTextTitle1" type="text" />
                  </label>
                  <label>
                    <span>리스크 1 내용</span>
                    <input id="riskTextContents11" type="text" />
                  </label>
                  <label>
                    <span>리스크 2 제목</span>
                    <input id="riskTextTitle2" type="text" />
                  </label>
                  <label>
                    <span>리스크 2 내용</span>
                    <input id="riskTextContents21" type="text" />
                  </label>
                </div>
              </section>

              <section class="page-section control-section">
                <h3>치환 데이터 JSON</h3>
                <label class="json-field">
                  <span>데이터 만들기 후 필요하면 직접 수정할 수 있습니다.</span>
                  <textarea id="pptData" spellcheck="false">{
  "corp_name": "",
  "call_percent": "",
  "refixing_percent": ""
}</textarea>
                </label>
              </section>

              <div data-info="ppt"></div>
            </div>
          </div>
        </section>

        <section id="updates" class="view">
          <div class="panel page-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">App Update</p>
                <h2>앱 최신버전 설치하기</h2>
              </div>
              <div class="panel-actions">
                <button id="checkUpdates" class="primary">새 버전 확인</button>
                <button id="downloadUpdate" class="secondary" disabled>업데이트 다운로드</button>
                <button id="installUpdate" class="primary" disabled>재시작 후 설치</button>
              </div>
            </div>

            <div class="page-body">
              <section class="page-section status-section">
                <h3>업데이트 상태</h3>
                <dl class="detail-list">
                  <div>
                    <dt>현재 버전</dt>
                    <dd id="currentVersion">확인 중</dd>
                  </div>
                  <div>
                    <dt>업데이트 기준</dt>
                    <dd id="updateFeed">확인 중</dd>
                  </div>
                  <div>
                    <dt>상태</dt>
                    <dd id="updateStatus">대기 중</dd>
                  </div>
                </dl>
              </section>

              <div data-info="updates"></div>
            </div>
          </div>
        </section>

        <section class="log-panel">
          <div class="panel-heading compact">
            <h2>활동 로그</h2>
            <button id="clearLog" class="ghost">지우기</button>
          </div>
          <ol id="logs" class="logs"></ol>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
