<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cretop Data Reader</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">C</span>
          <div>
            <strong>Cretop</strong>
            <small>Data Reader</small>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-button active" data-view="session">세션 연결</button>
          <button class="nav-button" data-view="capture">조건검색 복사</button>
        </nav>

        <div id="appVersion" class="app-version"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Desktop Console</p>
            <h1>Cretop Data Reader</h1>
          </div>
          <div class="top-status">
            <span id="loginPill" class="connection-pill disconnected">
              <span class="status-dot"></span>
              <span id="loginText">미연결</span>
            </span>
          </div>
        </header>

        <section id="session" class="view active">
          <div class="session-panel">
            <div class="session-actions">
              <button id="openChrome" class="primary">Chrome 열기</button>
              <button id="loginDone" class="primary">로그인 완료</button>
              <button id="closeAppChrome" class="danger">실행된 Chrome 종료</button>
              <button id="closeAllChrome" class="danger">전체 Chrome 종료</button>
            </div>
          </div>
        </section>

        <section id="capture" class="view">
          <div class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Condition Search</p>
                <h2>조건검색 결과 복사</h2>
              </div>
              <button id="captureTable" class="primary">화면 테이블 복사</button>
            </div>

            <div class="form-grid">
              <label>
                <span>최대 페이지</span>
                <input id="maxPages" type="number" min="1" placeholder="비우면 끝까지" />
              </label>
              <label class="file-field">
                <span>저장 파일</span>
                <div>
                  <input id="captureOutput" type="text" readonly />
                  <button id="pickOutput" class="secondary">변경</button>
                </div>
              </label>
            </div>
          </div>

          <div class="panel table-panel">
            <div class="panel-heading compact">
              <h2>복사 결과 미리보기</h2>
              <span id="captureCount" class="subtle">0행</span>
            </div>
            <div id="capturePreview" class="table-empty">아직 복사된 테이블이 없습니다.</div>
          </div>
        </section>

        <section class="log-panel">
          <div class="panel-heading compact">
            <h2>활동 로그</h2>
            <button id="clearLog" class="ghost">지우기</button>
          </div>
          <ol id="logs" class="logs"></ol>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
